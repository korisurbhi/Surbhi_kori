<html> 
<head> 
<title>JavaScript Example</title> 
<script> 
document.write("Hello World!<br>"); 
var a = 10, b = 5; 
document.write("Addition: " + (a + b) + "<br>"); 
var x = 16; 
document.write((x > 5) + "<br>"); 
var c = 10, d = 5; 
document.write((c > 5 && d < 10) + "<br>"); 
for(var i = 1; i <= 5; i++) { 
document.write(i + "<br>"); 
} 
var i = 10; 
while(i <= 15) { 
document.write(i + "<br>"); 
i++; 
} 

</script> 
</head> 
<body> 
</body> 
</html>
